<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta name="color-scheme" content="light">

<!-- Open Graph: edit if/when you add a banner image -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

<!-- Lets keyboard / screen-reader users jump straight past the nav -->
<a class="skip-link" href="#main">Skip to main content</a>

<header class="site-header">
  <div class="wrap header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">Ware&nbsp;<span>Hackspace</span></a>

    <button class="nav-toggle" id="navToggle" type="button" aria-expanded="false" aria-controls="navLinks">
      <span class="sr-only">Menu</span>
      <svg width="22" height="22" viewBox="0 0 22 22" aria-hidden="true" focusable="false">
        <path d="M3 6h16M3 11h16M3 16h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>

    <nav class="site-nav" id="navLinks" aria-label="Primary">
      <a href="{{ '/' | relative_url }}#about">About</a>
      <a href="{{ '/' | relative_url }}#hackspace">Hackspace</a>
      <a href="{{ '/' | relative_url }}#lug">Ware LUG</a>
      <a href="{{ '/' | relative_url }}#roadmap">Roadmap</a>
      <a href="{{ '/updates.html' | relative_url }}"{% if page.url contains '/updates' %} aria-current="page"{% endif %}>Updates</a>
      <a href="{{ '/groups.html' | relative_url }}"{% if page.url == '/groups.html' %} aria-current="page"{% endif %}>Local groups</a>
      <a class="nav-cta" href="{{ '/' | relative_url }}#involved">Get involved</a>
    </nav>
  </div>
</header>

<main id="main">
{{ content }}
</main>

<footer class="site-footer">
  <div class="wrap">
    <p>Ware Hackspace — built in the open on GitHub.</p>
    <!-- EDIT: replace with your real repo path -->
    <p><a href="https://github.com/YOUR-USERNAME/ware-hackspace" target="_blank" rel="noopener">View the source</a> · Ware, Hertfordshire · 2026</p>
    <p class="a11y-note">This site aims to meet WCAG 2.1 AA. Spotted an accessibility problem? <a href="{{ '/' | relative_url }}#involved">Let us know</a>.</p>
  </div>
</footer>

<script src="{{ '/assets/main.js' | relative_url }}" defer></script>
</body>
</html>
